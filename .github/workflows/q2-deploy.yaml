name: Deploy-q2

on:
  workflow_dispatch: {}

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      emptyMatrix: ${{ steps.set-matrix.outputs.emptyMatrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: set-matrix
        shell: bash
        run: |
          set -euo pipefail

          echo "Scanning for kafka/*/q2-vars.yaml files..."
          # Find topics that actually have q2-vars.yaml present
          mapfile -t TOPICS < <(find kafka -mindepth 2 -maxdepth 2 -type f -name "q2-vars.yaml" -printf "%h\n" \
            | awk -F'/' '{print $2}' | sort -u)

          if [[ ${#TOPICS[@]} -eq 0 ]]; then
            echo "No kafka topics contain q2-vars.yaml"
            echo "emptyMatrix=true" >> "$GITHUB_OUTPUT"
            echo "matrix=[]" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          csv=$(IFS=,; echo "${TOPICS[*]}")
          json=$(jq -c -n --arg v "$csv" '{"topic": ($v|split(","))}')

          echo "Found topics with q2-vars.yaml: $csv"
          echo "matrix=$json" >> "$GITHUB_OUTPUT"
          echo "emptyMatrix=false" >> "$GITHUB_OUTPUT"

  deploy:
    needs: setup-matrix
    runs-on: ubuntu-latest
    if: needs.setup-matrix.outputs.emptyMatrix == 'false'
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to q2
        uses: nais/deploy/actions/deploy@v1
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: dev-gcp
          RESOURCE: kafka/${{ matrix.topic }}/topic.yaml
          VARS: kafka/${{ matrix.topic }}/q2-vars.yaml
          PRINT_PAYLOAD: true
